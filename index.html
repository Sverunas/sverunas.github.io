<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #f4f4f4;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      header {
        background-color: #333;
        color: #fff;
        padding: 1em;
        text-align: center;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1em;
        flex-grow: 1;
        background-color: gray;
        gap: 30px;
      }

      section {
        margin-bottom: 1em;
        text-align: center;
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      a {
        color: blue;
        font-weight: bold;
        text-decoration: none;
      }

      footer {
        background-color: #333;
        color: #fff;
        padding: 1em;
        text-align: center;
      }
    </style>

    <title>Parduodami domenai</title>
  </head>

  <body>
    <header>
      <h1>Parduodami Domenai</h1>
    </header>

    <main>

      <!-- creditum.lt -->
      <section>
        <h1>creditum.lt</h1>
        <img src="creditum1.png" alt="creditum" />
        <h3>Tel.: +37062443275</h3>
      </section>

      <!-- oslas.lt -->
      <section>
        <h1>oslas.lt</h1>
        <img src="oslas.png" alt="oslas" />
        <p>Lietuviams Norvegijoje skirtas domenas ir svetainės projektas.</p>

        <p>
          Peržiūrėti projektą:
          <a href="https://creditum.lt\oslas.lt" target="_blank">oslas.lt</a>
        </p>

        <h3>Tel.: +37062443275</h3>
      </section>

    </main>

    <footer>
      <p>© 2026 Domenai parduodami</p>
    </footer>
  </body>
</html>
